
# Application identity
spring.application.name=shopping-mcp-server

# MCP server configuration
spring.ai.mcp.server.name=shopping-mcp-server
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.protocol=STREAMABLE

# Server port
server.port=8081

# --- Persistent database (PostgreSQL, running in Docker) ---
spring.datasource.url=jdbc:postgresql://localhost:5433/shopping
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=shopping_user
spring.datasource.password=${DB_PASSWORD:shopping_pass}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# --- Stripe (test mode) ---
# Get your test secret key from https://dashboard.stripe.com/test/apikeys
stripe.api-key=${STRIPE_API_KEY:}
# From `stripe listen --forward-to localhost:8080/webhooks/stripe` (local) or the Stripe Dashboard webhook config (deployed)
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}

# --- Tax (simplified flat rate) ---
shopping.tax-rate-percent=8.0

# --- Amazon Creators API (search-only, affiliate links) ---
# Get these from Amazon Associates Central > Creators API
amazon.creators-api.credential-id=${AMAZON_CREDENTIAL_ID:}
amazon.creators-api.credential-secret=${AMAZON_CREDENTIAL_SECRET:}
amazon.creators-api.partner-tag=${AMAZON_PARTNER_TAG:}
amazon.creators-api.marketplace=www.amazon.com

# Logging (optional, handy while developing)
logging.level.org.springframework.ai.mcp=DEBUG
