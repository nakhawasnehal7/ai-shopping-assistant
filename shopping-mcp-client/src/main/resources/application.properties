# Client identity
spring.application.name=shopping-mcp-client

# --- MCP server connection ---
spring.ai.mcp.client.streamable-http.connections.shopping-server.url=http://localhost:8081

# --- Local LLM via Ollama ---
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=llama3.1

server.port=8082

logging.level.org.springframework.ai.mcp=WARN
logging.level.org.springframework.ai.chat.client=DEBUG
spring.main.web-application-type=none

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console